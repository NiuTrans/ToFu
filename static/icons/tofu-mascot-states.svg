<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    Tofu Mascot — Pixel Art State Machine
    A true pixel-grid isometric tofu cube with animated expressions.
    Each state can be activated by adding class: idle, thinking, success, error, sleeping
    Default view shows the idle/happy state.
  -->
  <defs>
    <!-- Pixel grid snap filter for crispy rendering -->
    <filter id="crisp" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0"/>
    </filter>

    <!-- Tofu body gradients -->
    <linearGradient id="top" x1="0" y1="0" x2=".4" y2="1">
      <stop offset="0%" stop-color="#FEF9EE"/>
      <stop offset="100%" stop-color="#F8EDD6"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2=".2" y2="1">
      <stop offset="0%" stop-color="#F5E8CE"/>
      <stop offset="100%" stop-color="#ECDCC0"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2=".6">
      <stop offset="0%" stop-color="#E8D8B8"/>
      <stop offset="100%" stop-color="#DCCAA2"/>
    </linearGradient>

    <!-- Sparkle star symbol -->
    <symbol id="sparkle" viewBox="0 0 12 12">
      <path d="M6 0 L7 4 L12 6 L7 8 L6 12 L5 8 L0 6 L5 4Z" fill="white" opacity="0.85"/>
    </symbol>

    <!-- Pixel-perfect shadow -->
    <pattern id="pixelShadow" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="rgba(30,22,40,0.08)"/>
      <rect x="2" y="2" width="2" height="2" fill="rgba(30,22,40,0.08)"/>
    </pattern>
  </defs>

  <style>
    .tofu-body { image-rendering: pixelated; }

    /* ── Float animation ── */
    .tofu-group {
      animation: tFloat 4s ease-in-out infinite;
      transform-origin: 128px 140px;
    }
    @keyframes tFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* ── Eye blink ── */
    .eye {
      animation: tBlink 5s ease-in-out infinite;
      transform-origin: center;
    }
    .eye-r { animation-delay: 0.15s; }
    @keyframes tBlink {
      0%, 88%, 100% { transform: scaleY(1); }
      92% { transform: scaleY(0.08); }
      95% { transform: scaleY(1); }
    }

    /* ── Blush pulse ── */
    .blush {
      animation: tBlush 3s ease-in-out infinite;
    }
    @keyframes tBlush {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.6; }
    }

    /* ── Sparkle twinkle ── */
    .sparkle-1 { animation: tSparkle 2.5s ease-in-out infinite; }
    .sparkle-2 { animation: tSparkle 3.2s ease-in-out infinite 0.8s; }
    .sparkle-3 { animation: tSparkle 2.8s ease-in-out infinite 1.5s; }
    @keyframes tSparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.9; transform: scale(1); }
    }

    /* ── Steam wisps ── */
    .steam {
      animation: tSteam 3s ease-out infinite;
      transform-origin: center bottom;
    }
    .steam-2 { animation-delay: 1s; }
    .steam-3 { animation-delay: 2s; }
    @keyframes tSteam {
      0% { opacity: 0; transform: translateY(0) scaleX(0.7); }
      15% { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(-28px) scaleX(1.8); }
    }

    /* ── Pixel shadow bounce ── */
    .shadow {
      animation: tShadow 4s ease-in-out infinite;
    }
    @keyframes tShadow {
      0%, 100% { opacity: 0.12; transform: scaleX(1); }
      50% { opacity: 0.08; transform: scaleX(0.92); }
    }
  </style>

  <!-- ═══ Ground shadow (pixel checkerboard ellipse) ═══ -->
  <ellipse class="shadow" cx="128" cy="218" rx="48" ry="12"
           fill="url(#pixelShadow)" opacity="0.12"/>

  <!-- ═══ Main tofu group ═══ -->
  <g class="tofu-group tofu-body">

    <!-- Steam wisps above tofu -->
    <text class="steam" x="110" y="58" font-size="14" fill="#C4BB9F" opacity="0">~</text>
    <text class="steam steam-2" x="130" y="52" font-size="16" fill="#C4BB9F" opacity="0">~</text>
    <text class="steam steam-3" x="122" y="56" font-size="12" fill="#C4BB9F" opacity="0">~</text>

    <!-- ══ Isometric Tofu Cube ══ -->

    <!-- Top face -->
    <path d="M128 65 L68 98 L128 132 L188 98Z"
          fill="url(#top)" stroke="#2A1F30" stroke-width="2"
          stroke-linejoin="round"/>

    <!-- Shine on top face -->
    <path d="M96 85 L108 79 L118 84 L106 90Z"
          fill="white" opacity="0.45"/>

    <!-- Left face -->
    <path d="M68 98 L68 170 L128 204 L128 132Z"
          fill="url(#left)" stroke="#2A1F30" stroke-width="2"
          stroke-linejoin="round"/>

    <!-- Right face -->
    <path d="M128 132 L128 204 L188 170 L188 98Z"
          fill="url(#right)" stroke="#2A1F30" stroke-width="2"
          stroke-linejoin="round"/>

    <!-- Subtle texture lines on left face -->
    <line x1="78" y1="118" x2="118" y2="140" stroke="#E0D0B8" stroke-width="0.6" opacity="0.4"/>
    <line x1="78" y1="138" x2="118" y2="160" stroke="#E0D0B8" stroke-width="0.6" opacity="0.3"/>

    <!-- Subtle texture lines on right face -->
    <line x1="178" y1="118" x2="138" y2="140" stroke="#D5C5A5" stroke-width="0.6" opacity="0.3"/>
    <line x1="178" y1="138" x2="138" y2="160" stroke="#D5C5A5" stroke-width="0.6" opacity="0.25"/>

    <!-- ══ Face features (on left face, isometric perspective) ══ -->

    <!-- Left eye -->
    <g class="eye eye-l">
      <rect x="82" y="132" width="12" height="16" rx="2"
            fill="#2A1F30" transform="skewY(27) translate(-40, -10)"/>
      <rect x="89" y="133" width="4.5" height="6" rx="1"
            fill="white" opacity="0.88"
            transform="skewY(27) translate(-40, -10)"/>
    </g>

    <!-- Right eye -->
    <g class="eye eye-r">
      <rect x="104" y="145" width="12" height="16" rx="2"
            fill="#2A1F30" transform="skewY(27) translate(-40, -10)"/>
      <rect x="111" y="146" width="4.5" height="6" rx="1"
            fill="white" opacity="0.88"
            transform="skewY(27) translate(-40, -10)"/>
    </g>

    <!-- Cute smile -->
    <path d="M88 170 Q98 178 108 170"
          stroke="#2A1F30" stroke-width="2" fill="none"
          stroke-linecap="round" opacity="0.5"/>

    <!-- Blush marks -->
    <ellipse class="blush" cx="83" cy="166" rx="6" ry="3.5"
             fill="#F8A4A0" opacity="0.45"
             transform="skewY(27) translate(-50, -18)"/>
    <ellipse class="blush" cx="115" cy="174" rx="6" ry="3.5"
             fill="#F8A4A0" opacity="0.45"
             transform="skewY(27) translate(-45, -10)"/>

    <!-- ══ Tiny pixel feet at bottom ══ -->
    <rect x="94" y="200" width="8" height="4" rx="1" fill="#E8D4B8" stroke="#2A1F30" stroke-width="1"/>
    <rect x="122" y="196" width="8" height="4" rx="1" fill="#E8D4B8" stroke="#2A1F30" stroke-width="1"/>

    <!-- ══ Tiny arms (stubby pixel nubs) ══ -->
    <!-- Left arm -->
    <rect x="62" y="142" width="8" height="6" rx="1.5" fill="#F0E0C8" stroke="#2A1F30" stroke-width="1.2"/>
    <!-- Right arm -->
    <rect x="186" y="130" width="8" height="6" rx="1.5" fill="#E0D0B0" stroke="#2A1F30" stroke-width="1.2"/>

  </g>

  <!-- ═══ Sparkle decorations ═══ -->
  <use href="#sparkle" class="sparkle-1" x="42" y="68" width="10" height="10"/>
  <use href="#sparkle" class="sparkle-2" x="196" y="56" width="8" height="8"/>
  <use href="#sparkle" class="sparkle-3" x="204" y="140" width="7" height="7"/>

  <!-- ═══ Tiny floating hearts (kawaii detail) ═══ -->
  <text font-size="10" opacity="0.35" fill="#E8888A">
    <tspan x="48" y="90">♡</tspan>
  </text>
  <text font-size="8" opacity="0.25" fill="#E8888A">
    <tspan x="200" y="108">♡</tspan>
  </text>
</svg>
